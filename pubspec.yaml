name: passwordpdf_manager
description: "PDF Password Manager - Secure PDF & Password Management"
publish_to: 'none'
version: 1.0.0-beta.3+102

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  # UI and Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Authentication (for settings toggle)
  local_auth: ^2.1.8
  
  # Utilities
  intl: ^0.18.1
  permission_handler: ^11.1.0
  share_plus: ^7.2.2
  path_provider: ^2.1.1
  flutter_secure_storage: ^8.1.0
  
  # PDF Handling
  # receive_sharing_intent: ^1.8.0 # Will add for Open With feature later
  file_picker: ^6.1.1
  archive: ^3.4.9
  syncfusion_flutter_pdfviewer: ^27.1.58
  syncfusion_flutter_pdf: ^27.2.5
  excel: ^4.0.0
  flutter_local_notifications: ^19.5.0
  receive_sharing_intent: ^1.8.1
  # flutter_pdfview: ^1.3.2 (add after basic dashboard works)
  # pdfx: ^2.6.0 (has Kotlin compile errors)
  # pdfx: ^2.6.0 (has Kotlin compile errors)
  open_filex: ^4.3.4
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/branding/ic_launcher.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/branding/ic_launcher.png"  
  web:
    generate: true
    image_path: "assets/branding/ic_launcher.png"
    background_color: "#hex_code"
    theme_color: "#hex_code"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/branding/
