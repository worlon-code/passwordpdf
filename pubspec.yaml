name: passwordpdf_manager
description: "PDF Password Manager - Secure PDF & Password Management"
publish_to: 'none'
version: 1.0.0-beta.3+103

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI and Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^7.0.0
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  shared_preferences: ^2.3.2
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Authentication (for settings toggle)
  local_auth: ^3.0.0
  
  # Utilities
  intl: ^0.20.2
  permission_handler: ^12.0.1
  share_plus: ^10.0.0
  path_provider: ^2.1.4
  flutter_secure_storage: ^10.0.0
  device_info_plus: ^12.3.0
  
  # PDF Handling
  file_picker: ^10.3.8
  pdfrx: ^2.2.20
  
  # UI & Utility
  syncfusion_flutter_pdf: ^32.1.22
  flutter_local_notifications: ^19.5.0
  receive_sharing_intent: ^1.8.1
  open_filex: ^4.3.2
  shimmer: ^3.0.0

dependency_overrides:
  share_plus: ^10.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/branding/ic_launcher.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/branding/ic_launcher.png"  
  web:
    generate: true
    image_path: "assets/branding/ic_launcher.png"
    background_color: "#hex_code"
    theme_color: "#hex_code"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/branding/
