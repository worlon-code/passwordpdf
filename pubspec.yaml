name: passwordpdf_manager
description: "PDF Password Manager - Secure PDF & Password Management"
publish_to: 'none'
version: 0.0.7+7

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  # UI and Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Authentication (for settings toggle)
  local_auth: ^2.1.8
  
  # Utilities
  intl: ^0.18.1
  permission_handler: ^11.1.0
  share_plus: ^7.2.2
  path_provider: ^2.1.1
  flutter_secure_storage: ^8.1.0
  
  # PDF Handling
  # receive_sharing_intent: ^1.8.0 (add after dashboard works)
  file_picker: ^6.1.1
  archive: ^3.4.9
  # flutter_pdfview: ^1.3.2 (add after basic dashboard works)
  # pdfx: ^2.6.0 (has Kotlin compile errors)
  # open_filex: ^4.3.4 (add after dashboard works)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
